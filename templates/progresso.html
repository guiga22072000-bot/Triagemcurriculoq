<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Processando currículos...</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
  <h2>⏳ Analisando currículos...</h2>
  <p id="status-text">Iniciando processamento...</p>

  <div class="progress-bar-wrapper">
    <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
  </div>
  <p id="count-text" style="text-align:center; margin-top: 8px; color: #555;"></p>
</div>

<script>
  const jobId = "{{ job_id }}";
  const interval = setInterval(async () => {
    const res = await fetch(`/status/${jobId}`);
    const data = await res.json();
    const pct = data.total > 0 ? Math.round((data.done / data.total) * 100) : 0;

    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("count-text").textContent =
      `${data.done} de ${data.total} currículos analisados`;
    document.getElementById("status-text").textContent =
      data.done < data.total ? "Analisando com IA..." : "Finalizando...";

    if (data.status === "done") {
      clearInterval(interval);
      document.getElementById("status-text").textContent = "✅ Concluído! Redirecionando...";
      setTimeout(() => { window.location.href = `/resultado/${jobId}`; }, 800);
    }
    if (data.status === "error") {
      clearInterval(interval);
      document.getElementById("status-text").textContent = "❌ Erro: " + data.error;
    }
  }, 1500);
</script>
</body>
</html>
