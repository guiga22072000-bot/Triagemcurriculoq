<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Processando Currículos...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            transition: width 0.5s ease;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
        }

        .spinner {
            margin-top: 30px;
            border: 5px solid #1e293b;
            border-top: 5px solid #22c55e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-left: auto;
            margin-right: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧠 Analisando currículos...</h1>
        <p>A IA está avaliando os candidatos. Aguarde um pouco ⏳</p>

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="info" id="statusText">
            Iniciando...
        </div>

        <div class="spinner"></div>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const bar = document.getElementById("progress");
        const statusText = document.getElementById("statusText");

        async function checkStatus() {
            try {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();

                const total = data.total || 1;
                const done = data.done || 0;

                const percent = Math.floor((done / total) * 100);

                bar.style.width = percent + "%";
                statusText.innerText = `${done} de ${total} currículos processados (${percent}%)`;

                if (data.status === "done") {
                    window.location.href = `/resultado/${jobId}`;
                } else if (data.status === "error") {
                    statusText.innerText = "Erro ao processar currículos.";
                } else {
                    setTimeout(checkStatus, 1500);
                }

            } catch (err) {
                statusText.innerText = "Erro de conexão. Tentando novamente...";
                setTimeout(checkStatus, 3000);
            }
        }

        // começa polling
        checkStatus();
    </script>
</body>
</html>
